<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Redirecting to Encyclopedia Galactica</title>
    <link rel="canonical" href="https://nolank.ca/galaxywiki/">
    <meta http-equiv="refresh" content="0; url=/galaxywiki/">
    <script>
      // Preserve any path/query/hash after /wiki/ when redirecting.
      (function () {
        var rest = window.location.pathname.replace(/^\/wiki\/?/, "");
        window.location.replace("/galaxywiki/" + rest + window.location.search + window.location.hash);
      })();
    </script>
  </head>
  <body>
    <p>This page has moved to <a href="/galaxywiki/">nolank.ca/galaxywiki</a>.</p>
  </body>
</html>
